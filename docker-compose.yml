services:

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: ./backend
    command: celery -A app.workers.tasks worker --loglevel=info
    depends_on:
      - redis